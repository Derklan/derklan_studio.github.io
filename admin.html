<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Admin — STUDIO</title>
  <style>
    .admin-wrap { max-width: 780px; margin: 0 auto; padding: 0 24px; }
    .login-box { max-width: 380px; margin: 0 auto; padding: 60px 0; }
    .login-box h2 { font-family: var(--display); font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .login-err { color: var(--g1); font-family: var(--mono); font-size: 12px; margin-top: 10px; display: none; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
    .toolbar h2 { font-family: var(--display); font-size: 24px; font-weight: 700; }
    .toolbar-btns { display: flex; gap: 10px; }
    .sm-btn { font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 8px;
      border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); cursor: pointer;
      transition: border-color .2s, background .2s; }
    .sm-btn:hover { border-color: rgba(177,75,255,.5); background: rgba(177,75,255,.06); }
    .sm-btn.danger { color: var(--g1); border-color: rgba(255,46,126,.3); }
    .sm-btn.danger:hover { background: rgba(255,46,126,.08); }
    .sm-btn.primary { color: #0a0a0c; background: #fff; border-color: #fff; }
    .sm-btn.primary:hover { box-shadow: 0 6px 24px -6px var(--glow); }
    .editor { display: none; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); padding: 28px; margin-bottom: 28px; }
    .editor .field input, .editor .field textarea, .editor .field select { font-size: 14px; }
    .editor textarea { min-height: 100px; font-family: var(--mono); font-size: 13px; line-height: 1.6; }
    .editor .hint { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
    .ed-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media(max-width:560px) { .ed-row { grid-template-columns: 1fr; } }
    .post-list-admin { display: flex; flex-direction: column; gap: 12px; }
    .post-item { display: flex; justify-content: space-between; align-items: center; gap: 14px;
      border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; background: var(--surface); }
    .post-item:hover { border-color: rgba(177,75,255,.3); }
    .post-item .info h4 { font-family: var(--display); font-size: 17px; font-weight: 600; }
    .post-item .info p { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
    .post-item .actions { display: flex; gap: 8px; flex-shrink: 0; }
    .empty { text-align: center; color: var(--muted); font-family: var(--mono); padding: 50px 0; font-size: 14px; }
    @media(max-width:560px) { .post-item { flex-direction: column; align-items: flex-start; } .post-item .actions { align-self: flex-end; } }
  </style>
</head>
<body>

  <!-- ======================== NAVIGATION ======================== -->
  <div id="header"></div>

  <section class="section" style="padding-top:100px">

    <!-- ============ LOGIN ============ -->
    <div id="login-view" class="login-box">
      <p class="label">// admin.auth()</p>
      <h2>Espace admin</h2>
      <p>Connecte-toi pour gérer le devlog.</p>
      <div class="field">
        <label for="pwd">// mot de passe</label>
        <input id="pwd" type="password" placeholder="••••••••" autocomplete="off" />
      </div>
      <button class="btn-primary" style="border:none;cursor:pointer;width:100%;text-align:center;margin-top:14px" id="login-btn">SE CONNECTER</button>
      <p class="login-err" id="login-err">// accès refusé</p>
    </div>

    <!-- ============ DASHBOARD ============ -->
    <div id="dashboard" class="admin-wrap" style="display:none">

      <div class="toolbar">
        <h2>// devlog</h2>
        <div class="toolbar-btns">
          <button class="sm-btn primary" id="new-btn">+ Nouveau devlog</button>
          <button class="sm-btn danger" id="logout-btn">Déconnexion</button>
        </div>
      </div>

      <!-- ============ ÉDITEUR STRUCTURÉ ============ -->
      <div class="editor" id="editor">
        <p class="label" style="margin-bottom:20px">// nouveau devlog</p>

        <!-- Ligne 1 : Projet + Statut -->
        <div class="ed-row">
          <div class="field">
            <label>🎮 Nom du projet</label>
            <input id="ed-project" type="text" placeholder="Mon Super Jeu" />
          </div>
          <div class="field">
            <label>📊 Statut</label>
            <select id="ed-status">
              <option value="concept">⚪ Concept — idéation</option>
              <option value="preprod">🟠 Pré-production — prototypage</option>
              <option value="production">🔴 En production — dev actif</option>
              <option value="alpha">🟣 Alpha — jouable, features incomplètes</option>
              <option value="beta">🔵 Beta — feature-complete, polish</option>
              <option value="rc">🔷 Release Candidate</option>
              <option value="gold">🟢 Gold — version finale</option>
              <option value="live">🟡 Live — sorti, MAJ actives</option>
              <option value="onhold">⚫ En pause</option>
            </select>
          </div>
        </div>

        <!-- Ligne 2 : Engine + Version -->
        <div class="ed-row">
          <div class="field">
            <label>⚙️ Moteur & version</label>
            <input id="ed-engine" type="text" placeholder="Unity 6000.0.23f1" />
          </div>
          <div class="field">
            <label>📦 Version du projet</label>
            <input id="ed-version" type="text" placeholder="0.3.1" />
          </div>
        </div>

        <!-- Pitch -->
        <div class="field">
          <label>💬 Pitch (une ligne)</label>
          <input id="ed-pitch" type="text" placeholder="Une ligne pour rappeler de quoi il s'agit" />
        </div>

        <!-- Ce que j'ai fait -->
        <div class="field">
          <label>✅ Nouvelles fonctionnalités</label>
          <textarea id="ed-done" placeholder="Une fonctionnalité / modification par ligne&#10;Fix du bug de collision&#10;Nouveau shader eau&#10;UI du menu principal"></textarea>
          <p class="hint">Une fonctionnalité / modification par ligne (Enter pour séparer)</p>
        </div>

        <!-- Prochaines étapes -->
        <div class="field">
          <label>➡️ À venir</label>
          <textarea id="ed-next" placeholder="Intégrer le multijoueur&#10;Optimiser les LOD&#10;Tester sur Quest 3"></textarea>
          <p class="hint">Une tâche par ligne</p>
        </div>

                <!-- Médias (manager visuel) -->
        <div class="field">
          <label>📸 Médias (optionnel)</label>
          <div class="media-manager" id="media-manager">
            <div class="media-entries" id="media-entries"></div>
            <button type="button" class="media-add" id="media-add-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
              Ajouter une image
            </button>
          </div>
          <p class="hint">Colle l'URL d'une image (Imgur, Discord CDN, GitHub...) et ajoute une description.</p>
          <input type="hidden" id="ed-media" />
        </div>

        <div style="display:flex;gap:10px;margin-top:18px">
          <button class="sm-btn primary" id="save-btn">Publier</button>
          <button class="sm-btn" id="cancel-btn">Annuler</button>
        </div>
        <input type="hidden" id="ed-id" />
      </div>

      <!-- Liste des posts -->
      <div class="post-list-admin" id="admin-posts"></div>

    </div>
  </section>

  <div id="footer"></div>
  <script src="components.js"></script>
  <script src="admin.js"></script>
  <script>
    (function(){
      const $ = id => document.getElementById(id);
      const loginView = $('login-view'), dashboard = $('dashboard');
      const editor = $('editor'), adminPosts = $('admin-posts');

      const FIELDS = ['project','status','engine','version','pitch','done','next','media'];

      function route() {
        if (isLoggedIn()) { loginView.style.display='none'; dashboard.style.display='block'; renderList(); }
        else { loginView.style.display='block'; dashboard.style.display='none'; }
      }

      $('login-btn').onclick = async () => {
        const ok = await tryLogin($('pwd').value);
        if (ok) route(); else { $('login-err').style.display='block'; $('pwd').value=''; }
      };
      $('pwd').onkeydown = e => { if(e.key==='Enter') $('login-btn').click(); };
      $('logout-btn').onclick = logout;

      function clearEditor() { FIELDS.forEach(f => $('ed-'+f).value = ''); $('ed-id').value=''; }

      $('new-btn').onclick = () => { clearEditor(); editor.style.display='block'; $('ed-project').focus(); };
      $('cancel-btn').onclick = () => { editor.style.display='none'; };

      $('save-btn').onclick = () => {
        const data = {}; FIELDS.forEach(f => data[f] = $('ed-'+f).value.trim());
        if (!data.project) { $('ed-project').focus(); return; }
        const id = $('ed-id').value;
        if (id) updatePost(id, data); else addPost(data);
        editor.style.display='none'; renderList();
      };

      function renderList() {
        const posts = getPosts();
        if (!posts.length) { adminPosts.innerHTML='<p class="empty">// aucun devlog — clique sur "+ Nouveau devlog"</p>'; return; }
        adminPosts.innerHTML = posts.map(p => {
          const d = new Date(p.created).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
          const st = p.status ? (' · '+p.status) : '';
          return '<div class="post-item"><div class="info"><h4>'+esc(p.project||'Sans titre')+'</h4><p>'+d+st+'</p></div>'
            +'<div class="actions"><a class="sm-btn" href="article.html?id='+p.id+'" target="_blank">Voir</a>'
            +'<button class="sm-btn" onclick="editP(\''+p.id+'\')">Éditer</button>'
            +'<button class="sm-btn danger" onclick="delP(\''+p.id+'\')">Suppr.</button></div></div>';
        }).join('');
      }

      window.editP = (id) => {
        const p = getPost(id); if(!p) return;
        $('ed-id').value = p.id;
        FIELDS.forEach(f => $('ed-'+f).value = p[f] || '');
        editor.style.display='block'; $('ed-project').focus();
      };
      window.delP = (id) => { if(!confirm('Supprimer ce devlog ?')) return; deletePost(id); renderList(); };

      // ---- Media Manager ----
      var mediaList = [];

      function renderMediaEntries() {
        var container = $('media-entries');
        if (!mediaList.length) { container.innerHTML = ''; return; }
        container.innerHTML = mediaList.map(function(m, i) {
          return '<div class="media-entry">'
            + '<div class="me-preview" style="background-image:url(' + m.url.replace(/"/g,'&quot;') + ')"></div>'
            + '<div class="me-fields">'
            + '<input type="text" placeholder="URL de l\'image" value="' + (m.url||'').replace(/"/g,'&quot;') + '" onchange="updateMedia('+i+',\'url\',this.value)" />'
            + '<input type="text" placeholder="Description (optionnel)" value="' + (m.desc||'').replace(/"/g,'&quot;') + '" onchange="updateMedia('+i+',\'desc\',this.value)" />'
            + '</div>'
            + '<button type="button" class="me-del" onclick="removeMedia('+i+')" title="Supprimer">✕</button>'
            + '</div>';
        }).join('');
        syncMediaField();
      }

      function syncMediaField() {
        $('ed-media').value = JSON.stringify(mediaList);
      }

      window.updateMedia = function(i, key, val) {
        mediaList[i][key] = val;
        if (key === 'url') renderMediaEntries(); // refresh preview
        syncMediaField();
      };

      window.removeMedia = function(i) {
        mediaList.splice(i, 1);
        renderMediaEntries();
      };

      $('media-add-btn').onclick = function() {
        mediaList.push({ url: '', desc: '' });
        renderMediaEntries();
        // Focus le dernier input URL ajouté
        var inputs = $('media-entries').querySelectorAll('input[placeholder*="URL"]');
        if (inputs.length) inputs[inputs.length-1].focus();
      };

      // Override clearEditor pour reset le media manager
      var origClear = clearEditor;
      clearEditor = function() { origClear(); mediaList = []; renderMediaEntries(); };

      // Override editP pour charger les médias
      var origEdit = window.editP;
      window.editP = function(id) {
        origEdit(id);
        var p = getPost(id);
        try { mediaList = JSON.parse(p.media || '[]'); } catch(e) { mediaList = []; }
        renderMediaEntries();
      };

      route();
    })();
  </script>
  <script src="app.js"></script>
</html>
