<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Le titre est mis à jour dynamiquement par admin.js -->
  <title>Article — STUDIO</title>
  <style>
    /* Largeur de lecture confortable pour les articles */
    .article-wrap { max-width: 720px; margin: 0 auto; }
  </style>
</head>
<body>

  <!-- ======================== NAVIGATION ======================== -->
  <div id="header"></div>

  <!-- ======================== CONTENU ARTICLE (rendu dynamique) ======================== -->
  <!-- Le contenu est injecté par admin.js selon le paramètre ?id= dans l'URL -->
  <section class="section" style="padding-top:110px">
    <div class="article-wrap" id="article-content">
      <p style="text-align:center;color:var(--muted);font-family:var(--mono);padding:60px 0">// chargement...</p>
    </div>
  </section>

  <!-- ======================== FOOTER ======================== -->
  <div id="footer"></div>
  <script src="components.js"></script>
  <script src="admin.js"></script>
  <script src="app.js"></script>
</body>
</html>
